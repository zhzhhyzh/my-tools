name: Build & Release PDF Tools

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npx vite build

      - name: Install backend production deps
        working-directory: backend
        run: npm install --production

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Package Windows release
        run: |
          PKG=release/pdf-tools-windows
          mkdir -p $PKG/backend/uploads
          mkdir -p $PKG/frontend
          # Copy backend
          cp backend/index.js backend/package.json backend/package-lock.json $PKG/backend/
          cp -r backend/node_modules $PKG/backend/
          # Copy frontend dist
          cp -r frontend/dist $PKG/frontend/
          # Copy processing (exclude __pycache__)
          rsync -a --exclude='__pycache__' processing/ $PKG/processing/
          # Copy Windows scripts to root
          cp scripts/install-windows.bat $PKG/install.bat
          cp scripts/run-windows.bat $PKG/run.bat
          # Create zip
          cd release && zip -r ../pdf-tools-windows-${{ steps.version.outputs.tag }}.zip pdf-tools-windows/

      - name: Package Mac (AMD64) release
        run: |
          PKG=release/pdf-tools-mac-amd64
          mkdir -p $PKG/backend/uploads
          mkdir -p $PKG/frontend
          # Copy backend
          cp backend/index.js backend/package.json backend/package-lock.json $PKG/backend/
          cp -r backend/node_modules $PKG/backend/
          # Copy frontend dist
          cp -r frontend/dist $PKG/frontend/
          # Copy processing (exclude __pycache__)
          rsync -a --exclude='__pycache__' processing/ $PKG/processing/
          # Copy Mac scripts to root
          cp scripts/install-mac.sh $PKG/install.sh
          cp scripts/run-mac.sh $PKG/run.sh
          chmod +x $PKG/install.sh $PKG/run.sh
          # Create tar.gz
          cd release && tar -czf ../pdf-tools-mac-amd64-${{ steps.version.outputs.tag }}.tar.gz pdf-tools-mac-amd64/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "PDF Tools ${{ steps.version.outputs.tag }}"
          body: |
            ## PDF Tools Suite ${{ steps.version.outputs.tag }}

            A complete, free PDF tools suite with 25 tools for all your PDF needs.

            ### Download
            | Platform | File |
            |----------|------|
            | Windows | `pdf-tools-windows-${{ steps.version.outputs.tag }}.zip` |
            | Mac (AMD64) | `pdf-tools-mac-amd64-${{ steps.version.outputs.tag }}.tar.gz` |

            ### Prerequisites
            - **Node.js 18+** - [Download](https://nodejs.org/)
            - **Python 3.8+** - [Download](https://www.python.org/)

            ### Quick Start
            **Windows:**
            1. Extract the zip
            2. Run `install.bat` (first time only)
            3. Run `run.bat` to start

            **Mac:**
            1. Extract the tar.gz
            2. Run `chmod +x install.sh run.sh`
            3. Run `./install.sh` (first time only)
            4. Run `./run.sh` to start

            ### Optional Dependencies (for full functionality)
            - **LibreOffice** - Office file conversions
            - **Poppler** - PDF to image conversion
            - **Tesseract OCR** - OCR capability
            - **wkhtmltopdf** - HTML to PDF conversion
          draft: false
          prerelease: false
          files: |
            pdf-tools-windows-${{ steps.version.outputs.tag }}.zip
            pdf-tools-mac-amd64-${{ steps.version.outputs.tag }}.tar.gz
